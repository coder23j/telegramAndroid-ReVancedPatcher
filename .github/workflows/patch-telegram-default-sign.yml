name: Patch Telegram/Telegram X APK (Default Sign)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  patch-telegram-default-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Resolve latest releases (jq)
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          auth_header="Authorization: Bearer ${GITHUB_TOKEN}"
          accept_header="Accept: application/vnd.github+json"

          cli_json="$(
            curl -fsSL \
              -H "$accept_header" \
              -H "$auth_header" \
              "https://api.github.com/repos/ReVanced/revanced-cli/releases/latest"
          )"

          exp_json="$(
            curl -fsSL \
              -H "$accept_header" \
              -H "$auth_header" \
              "https://api.github.com/repos/Aunali321/ReVancedExperiments/releases/latest"
          )"

          tgx_json="$(
            curl -fsSL \
              -H "$accept_header" \
              -H "$auth_header" \
              "https://api.github.com/repos/TGX-Android/Telegram-X/releases/latest"
          )"

          cli_url="$(jq -r '.assets[] | select(.name | endswith("-all.jar")) | .browser_download_url' <<<"$cli_json" | head -n1)"
          cli_tag="$(jq -r '.tag_name' <<<"$cli_json")"

          patches_url="$(jq -r '.assets[] | select((.name | endswith(".rvp")) and ((.name | endswith(".rvp.asc")) | not)) | .browser_download_url' <<<"$exp_json" | head -n1)"
          experiments_tag="$(jq -r '.tag_name' <<<"$exp_json")"
          telegramx_lollipop_url="$(jq -r '.assets[] | select((.name | test("(?i)lollipop")) and (.name | endswith(".apk"))) | .browser_download_url' <<<"$tgx_json" | head -n1)"
          telegramx_tag="$(jq -r '.tag_name' <<<"$tgx_json")"

          test -n "$cli_url"
          test -n "$patches_url"
          test -n "$telegramx_lollipop_url"

          {
            echo "cli_url=$cli_url"
            echo "cli_tag=$cli_tag"
            echo "patches_url=$patches_url"
            echo "experiments_tag=$experiments_tag"
            echo "telegramx_lollipop_url=$telegramx_lollipop_url"
            echo "telegramx_tag=$telegramx_tag"
          } >> "$GITHUB_OUTPUT"

          jq -n \
            --arg cli_url "$cli_url" \
            --arg cli_tag "$cli_tag" \
            --arg patches_url "$patches_url" \
            --arg experiments_tag "$experiments_tag" \
            --arg telegramx_lollipop_url "$telegramx_lollipop_url" \
            --arg telegramx_tag "$telegramx_tag" \
            '{
              cli_url: $cli_url,
              cli_tag: $cli_tag,
              patches_url: $patches_url,
              experiments_tag: $experiments_tag,
              telegramx_lollipop_url: $telegramx_lollipop_url,
              telegramx_tag: $telegramx_tag
            }' > release-metadata.json

      - name: Download CLI / patches / Telegram / Telegram X (lollipop) APK
        run: |
          set -euxo pipefail
          mkdir -p work

          curl -fL "${{ steps.release.outputs.cli_url }}" -o work/revanced-cli.jar
          curl -fL "${{ steps.release.outputs.patches_url }}" -o work/patches.rvp
          curl -fL "https://telegram.org/dl/android/apk" -o work/telegram.apk
          curl -fL "${{ steps.release.outputs.telegramx_lollipop_url }}" -o work/telegramx-lollipop.apk

      - name: Check patch availability for Telegram
        run: |
          set -euxo pipefail
          java -jar work/revanced-cli.jar list-patches --packages --versions -bp work/patches.rvp | tee work/list-patches.txt
          grep -Eqi "telegram|org\\.telegram\\.messenger" work/list-patches.txt

      - name: Patch Telegram APK (default signing)
        run: |
          set -euxo pipefail
          java -jar work/revanced-cli.jar patch \
            -bp work/patches.rvp \
            -o work/telegram-patched-default-sign-latest.apk \
            work/telegram.apk

          test -s work/telegram-patched-default-sign-latest.apk
          cp work/telegram-patched-default-sign-latest.apk "work/telegram-patched-default-sign-${{ steps.release.outputs.experiments_tag }}-${{ steps.release.outputs.cli_tag }}.apk"

      - name: Patch Telegram X Lollipop APK (default signing)
        run: |
          set -euxo pipefail
          java -jar work/revanced-cli.jar patch \
            -bp work/patches.rvp \
            -o work/telegramx-lollipop-patched-default-sign-latest.apk \
            work/telegramx-lollipop.apk

          test -s work/telegramx-lollipop-patched-default-sign-latest.apk
          cp work/telegramx-lollipop-patched-default-sign-latest.apk "work/telegramx-lollipop-patched-default-sign-${{ steps.release.outputs.telegramx_tag }}-${{ steps.release.outputs.experiments_tag }}-${{ steps.release.outputs.cli_tag }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-patched-default-sign-${{ steps.release.outputs.experiments_tag }}-${{ steps.release.outputs.cli_tag }}
          path: |
            work/*.apk
            work/list-patches.txt
            release-metadata.json
          if-no-files-found: error
